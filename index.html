<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeAlign - 智能跨时区找时间</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <header>
            <div class="logo" style="display: flex; align-items: center;">
                <img src="logo.png" alt="TimeAlign Logo" style="width: 48px; height: 48px; border-radius: 12px; margin-right: 12px; box-shadow: 0 0 15px rgba(129, 140, 248, 0.6); border: 1px solid rgba(255,255,255,0.2);">
                <h1 style="margin: 0; font-size: 2rem;">TimeAlign</h1>
            </div>
            <p>在全球任意时区寻找最完美的开会时间。</p>
        </header>

        <main class="two-column-layout">
            <div class="left-column">
                
                <!-- Meeting Info Card -->
                <section class="glass-card" id="meeting-info-card" style="margin-top: 0; margin-bottom: 1.5rem; padding: 20px;">
                    <div class="input-group" style="margin-bottom: 0;">
                        <input type="text" id="meeting-topic" class="glass-input" placeholder="✨ 创建新会议名称或者输入会议编号..." style="font-size: 1.25rem; font-weight: 600; padding: 12px 16px; color: var(--primary);">
                    </div>
                    <div id="meeting-id-badge" style="display:none; margin-top: 10px; padding: 8px 16px; background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(99,102,241,0.1)); border: 1px solid rgba(129,140,248,0.3); border-radius: 8px; font-size: 0.9rem; color: var(--primary); text-align: center;">
                        <span style="opacity:0.7;">📋 会议编号：</span><strong id="meeting-id-text"></strong>
                        <span style="opacity:0.5; margin-left: 8px; font-size: 0.8rem;">分享此编号即可协同找时间</span>
                    </div>
                </section>

                <div class="actions-bar" style="margin-top: 0; margin-bottom: 1.5rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden;">
                    <button id="share-btn" class="glass-btn secondary" style="border-radius: 0; border-right: 1px solid rgba(255,255,255,0.08); white-space: nowrap; padding: 12px 8px; margin:0; background: transparent; color: var(--primary);">
                        <span class="icon" style="margin-right:4px;">🔗</span>创建会议编号
                    </button>
                    <button id="add-participant-btn" class="glass-btn secondary" style="border-radius: 0; border-right: 1px solid rgba(255,255,255,0.08); white-space: nowrap; padding: 12px 8px; margin:0; background: transparent;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M12 5v14M5 12h14"/></svg>添加参与者
                    </button>
                    <button id="calculate-btn" class="glass-btn primary glowing" style="border-radius: 0; white-space: nowrap; padding: 12px 8px; margin:0;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>寻找最佳时间
                    </button>
                </div>
                <div id="participants-container">
                    <!-- Participant cards injected by JS -->
                </div>
            </div>

            <div class="right-column">
                <!-- Unified Results Section -->
                <section id="results-section" class="glass-card hidden">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px;">
                        <h2 style="margin: 0; display: flex; align-items: center;"><span class="icon">🎉</span> 最佳重合时间</h2>
                        <div style="display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 8px;">
                            <span class="icon" style="margin-left: 8px;">🌍</span>
                            <select id="viewer-timezone" class="glass-input timezone-select" style="min-width: 140px; border:none; background:transparent; max-width: 260px;"></select>
                            <button id="auto-locate-btn" class="glass-btn text-only" title="获取系统当前所在时区" style="padding: 4px 8px;"><span class="icon">📍</span>自动</button>
                        </div>
                    </div>
                    <div id="results-container">
                        <p class="placeholder-text">点击 "寻找最佳时间" 查看结果。</p>
                    </div>

                    <h3 style="margin-top: 2rem; margin-bottom: 1rem;"><span class="icon">📅</span> 全局空闲时间日历分布</h3>
                    <div class="timeline-container" id="timeline-container">
                        <!-- Injected by JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Templates -->
    <template id="participant-template">
        <section class="glass-card participant-card">
            <div class="participant-header">
                <div class="header-main" style="display: flex; align-items: center; gap: 10px; flex: 1;">
                    <img src="" alt="avatar" class="participant-avatar">
                    <input type="text" class="glass-input name-input" placeholder="姓名 (例如：Alice)" style="flex: 1; min-width: 80px;">
                </div>
                <div class="header-actions" style="display: flex; gap: 4px; margin-left: 8px;">
                    <button class="icon-btn toggle-details-btn" title="展开/收起详情">▼</button>
                    <button class="icon-btn remove-participant-btn" title="移除参与者">&times;</button>
                </div>
            </div>
            
            <div class="participant-details">
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin:0;">所属时区 (Timezone)</label>
                        <button class="participant-auto-locate" title="获取设备定位的时区" style="background:transparent; border:none; cursor:pointer; color:var(--primary); font-size:0.8rem; padding:0; outline:none;"><span class="icon">📍</span> 自动定位</button>
                    </div>
                    <select class="glass-input timezone-select p-tz"></select>
                </div>
                <div class="availability-list">
                    <h4>空闲时间</h4>
                    <div class="time-slots">
                        <!-- Read-only visualization of selected slots -->
                    </div>
                    <button class="open-calendar-btn glass-btn text-only"><span class="icon">📅</span> 在日历中拖动选择时间</button>
                </div>
            </div>
        </section>
    </template>

    <template id="slot-template">
        <div class="time-slot" style="flex-wrap: wrap;">
            <input type="date" class="glass-input date-input" style="flex: 1; min-width: 130px; margin-right: 0.5rem;" required>
            <input type="time" class="glass-input start-time" required>
            <span style="margin: 0 4px;">至</span>
            <input type="time" class="glass-input end-time" required>
            <button class="icon-btn confirm-slot-btn" title="保存修改并重新折叠为徽章" style="margin-left: 8px;">✅</button>
            <button class="icon-btn remove-slot-btn" title="移除该时段">&times;</button>
        </div>
    </template>

    <!-- Calendar Drag Modal -->
    <div id="calendar-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <header class="modal-header">
                <h3>滑动拖拽选择空闲时间</h3>
                <button class="close-modal-btn icon-btn">&times;</button>
            </header>
            <div class="calendar-controls">
                <button id="cal-prev-week" class="glass-btn text-only">&lt; 上一周</button>
                <h4 id="cal-current-month">2026年3月</h4>
                <button id="cal-next-week" class="glass-btn text-only">下一周 &gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Injected via calendar.js -->
            </div>
            <footer class="modal-footer">
                <button id="cal-clear-btn" class="glass-btn secondary">清空</button>
                <button id="cal-save-btn" class="glass-btn primary">保存时间段</button>
            </footer>
        </div>
    </div>

    <!-- Floating buttons container -->
    <div style="position:fixed; bottom:24px; right:24px; z-index:999; display:flex; gap:10px; align-items:center;">
        <button id="clear-meeting-btn" style="
            padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(135deg, rgba(239,68,68,0.8), rgba(220,38,38,0.9));
            color: #fff; font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 4px 20px rgba(239,68,68,0.3);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;
        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            🗑️ 清除会议数据
        </button>
        <button id="reset-session-btn" style="
            padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(135deg, rgba(99,102,241,0.8), rgba(129,140,248,0.9));
            color: #fff; font-size: 0.9rem; font-weight: 600;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;
        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            ✅ 确认保存
        </button>
    </div>

    <script src="calendar.js"></script>
    <script src="app.js"></script>
    <script>
        // Style clear button based on creator status
        const clearBtn = document.getElementById('clear-meeting-btn');
        if (!isCreator) {
            clearBtn.style.background = 'rgba(100,100,120,0.4)';
            clearBtn.style.boxShadow = 'none';
            clearBtn.style.cursor = 'not-allowed';
            clearBtn.style.opacity = '0.5';
        }
        clearBtn.addEventListener('click', function() {
            if (!isCreator) {
                alert('⚠️ 仅创建者可清除会议数据，请联系会议创建者操作。');
                return;
            }
            if (!confirm('确定要清除所有会议数据？此操作不可恢复。')) return;
            sessionStorage.clear();
            const badge = document.getElementById('meeting-id-badge');
            if (badge) badge.style.display = 'none';
            const badgeText = document.getElementById('meeting-id-text');
            if (badgeText) badgeText.textContent = '';
            const topic = document.getElementById('meeting-topic');
            if (topic) topic.value = '';
            history.replaceState(null, '', window.location.pathname);
            window.location.href = window.location.pathname;
        });

        document.getElementById('reset-session-btn').addEventListener('click', function() {
            const btn = this;
            const origHTML = btn.innerHTML;
            
            if (typeof saveData === 'function') saveData();
            
            const stateStr = sessionStorage.getItem('timeAlignState');
            if (!stateStr) {
                btn.innerHTML = '⚠️ 暂无数据';
                setTimeout(() => btn.innerHTML = origHTML, 2000);
                return;
            }
            
            const badgeText = document.getElementById('meeting-id-text');
            const meetingId = badgeText ? badgeText.textContent.trim() : '';
            
            btn.innerHTML = '⏳ 正在保存...';
            
            if (meetingId) {
                fetch(`${SUPABASE_URL}/rest/v1/meetings?id=eq.${meetingId}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: stateStr })
                }).then(res => {
                    if (res.ok) {
                        btn.innerHTML = '✅ 已确定你的时间！';
                        btn.style.background = 'linear-gradient(135deg, rgba(34,197,94,0.8), rgba(22,163,74,0.9))';
                    } else {
                        btn.innerHTML = '❌ 保存失败';
                    }
                    setTimeout(() => { btn.innerHTML = origHTML; btn.style.background = ''; }, 3000);
                }).catch(() => {
                    btn.innerHTML = '❌ 网络错误';
                    setTimeout(() => { btn.innerHTML = origHTML; btn.style.background = ''; }, 3000);
                });
            } else {
                btn.innerHTML = '✅ 已确定你的时间！';
                btn.style.background = 'linear-gradient(135deg, rgba(34,197,94,0.8), rgba(22,163,74,0.9))';
                setTimeout(() => { btn.innerHTML = origHTML; btn.style.background = ''; }, 3000);
            }
        });
    </script>
</body>
</html>
